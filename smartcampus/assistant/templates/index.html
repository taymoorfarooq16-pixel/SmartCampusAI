{% extends 'base.html' %}

{% block content %}

<div class="text-center mb-4">

    <h1>🤖 Smart Campus AI Assistant</h1>

    <p>AI-powered campus help system</p>

</div>

<div class="card p-4">

    <div id="chat-area">

        {% for msg in chat %}

            <div class="mb-3">

                <b>You:</b>
                <p>{{ msg.user }}</p>

                <b>Bot:</b>
                <p>{{ msg.bot }}</p>

            </div>

        {% endfor %}

    </div>

    <form method="post">

        {% csrf_token %}

        <div class="input-group">

            <input type="text" name="query" class="form-control" placeholder="Ask something..." required>

            <button class="btn btn-custom">Send</button>

        </div>

    </form>

</div>

{% endblock %}
